name: Сборка игры

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

env:
  GODOT_VERSION: "4.7.1"
  EXPORT_NAME: "Football_Manager_2003"

jobs:
  validate:
    name: Проверка базы и проекта
    runs-on: ubuntu-latest
    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Проверить базу данных и симуляцию
        run: python3 tools/validate_project.py

  export:
    name: Windows и Android
    needs: validate
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.7.1

    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Подготовить Godot и шаблоны экспорта
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/share/godot/export_templates"
          mkdir -p "$HOME/.config"
          mkdir -p "$HOME/.android"

          if [ -d "/root/.config/godot" ] && [ "$HOME" != "/root" ]; then
            rm -rf "$HOME/.config/godot"
            cp -a /root/.config/godot "$HOME/.config/godot"
          fi

          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ] && [ "$HOME" != "/root" ]; then
            rm -rf "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
            cp -a "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" \
              "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          fi

          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          if ! command -v zip >/dev/null 2>&1 || ! ldconfig -p 2>/dev/null | grep -q "libfontconfig.so.1"; then
            apt-get update
            apt-get install -y zip fontconfig
          fi
          godot --version

      - name: Импортировать ресурсы и проверить GDScript
        shell: bash
        run: godot --headless --path . --editor --quit --verbose

      - name: Собрать Windows
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/windows
          godot --headless --path . --verbose \
            --export-release "Windows" \
            "$(pwd)/build/windows/${EXPORT_NAME}.exe"

      - name: Добавить установщик Windows
        shell: bash
        run: |
          set -euo pipefail
          cp "tools/УСТАНОВИТЬ_ИГРУ.cmd" build/windows/
          cp "tools/УСТАНОВИТЬ_ИГРУ.ps1" build/windows/

      - name: Упаковать Windows
        shell: bash
        run: |
          set -euo pipefail
          cd build/windows
          zip -9 -r "../${EXPORT_NAME}_Windows.zip" .

      - name: Загрузить сборку Windows
        uses: actions/upload-artifact@v4
        with:
          name: Футбольный-менеджер-2003-Windows
          path: build/Football_Manager_2003_Windows.zip
          if-no-files-found: error
          retention-days: 30

      - name: Собрать Android debug APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/android
          godot --headless --path . --verbose \
            --export-debug "Android Debug" \
            "$(pwd)/build/android/${EXPORT_NAME}_debug.apk"
          cp "build/android/${EXPORT_NAME}_debug.apk" "build/${EXPORT_NAME}_Android_debug.apk"

      - name: Загрузить APK
        uses: actions/upload-artifact@v4
        with:
          name: Футбольный-менеджер-2003-Android-debug
          path: build/Football_Manager_2003_Android_debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Создать релиз для тега
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/Football_Manager_2003_Windows.zip
            build/Football_Manager_2003_Android_debug.apk
